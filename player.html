<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>ALYA Tube</title>
<!-- Telegram Mini App SDK -->
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap');

:root {
  --bg:         #0d0d12;
  --surface:    #15151e;
  --surface2:   #1c1c28;
  --surface3:   #242434;
  --border:     #2a2a3d;
  --accent:     #c084fc;   /* lilac-purple — matches Alya's hair vibe */
  --accent2:    #a855f7;
  --accent-glow:rgba(192,132,252,0.18);
  --red:        #f87171;
  --text:       #f0f0f8;
  --muted:      #7070a0;
  --muted2:     #4a4a6a;
  --radius:     12px;
  --tg-theme-bg-color: #0d0d12;
}

*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'Outfit',sans-serif;-webkit-font-smoothing:antialiased;}

/* ── Scrollbar ── */
::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px;}

/* ── Header ── */
header{
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 16px;
  background:rgba(13,13,18,0.92);
  backdrop-filter:blur(12px);
  border-bottom:1px solid var(--border);
  position:sticky;top:0;z-index:200;
}
.logo{display:flex;align-items:center;gap:9px;text-decoration:none;}
.logo-mark{
  width:34px;height:24px;
  background:linear-gradient(135deg,var(--accent2) 0%,#7c3aed 100%);
  border-radius:7px;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 0 12px rgba(168,85,247,0.4);
}
.logo-mark svg{fill:white;width:14px;height:14px;}
.logo-text{
  font-size:17px;font-weight:800;
  background:linear-gradient(90deg,var(--accent) 0%,#e879f9 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  letter-spacing:-0.3px;
}
.logo-sub{
  font-size:9px;font-weight:600;
  color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;
  margin-top:-2px;
}

/* header right side */
.header-right{display:flex;align-items:center;gap:8px;}
.icon-btn{
  width:34px;height:34px;border-radius:50%;
  background:var(--surface2);border:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;cursor:pointer;
  transition:background .15s;
  text-decoration:none;
}
.icon-btn:hover{background:var(--surface3);}
.icon-btn svg{fill:var(--muted);width:16px;height:16px;}

/* ── States ── */
#loading-screen,#error-screen{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  min-height:80vh;gap:16px;padding:24px;text-align:center;
}
.spinner{
  width:42px;height:42px;
  border:3px solid var(--border);border-top-color:var(--accent);
  border-radius:50%;animation:spin .75s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg);}}
.loading-label{color:var(--muted);font-size:13px;letter-spacing:.3px;}

.error-emoji{font-size:52px;line-height:1;}
.error-title{font-size:20px;font-weight:700;color:var(--red);}
.error-body{font-size:13px;color:var(--muted);max-width:280px;line-height:1.7;}

/* ── Main ── */
main{max-width:820px;margin:0 auto;padding:0 0 56px;}

/* ── Video wrap ── */
.video-wrap{
  position:relative;background:#000;
  aspect-ratio:16/9;width:100%;
  overflow:hidden;
}
/* Thumb overlay */
#thumb-overlay{
  position:absolute;inset:0;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;z-index:2;
}
#thumb-img{
  position:absolute;inset:0;width:100%;height:100%;
  object-fit:cover;transition:filter .25s;
}
#thumb-overlay:hover #thumb-img{filter:brightness(.75);}
.thumb-gradient{
  position:absolute;inset:0;
  background:linear-gradient(0deg,rgba(13,13,18,.7) 0%,transparent 50%);
  z-index:1;
}
.play-ring{
  position:relative;z-index:2;
  width:72px;height:72px;border-radius:50%;
  background:rgba(192,132,252,0.15);
  border:2px solid rgba(192,132,252,0.5);
  display:flex;align-items:center;justify-content:center;
  backdrop-filter:blur(4px);
  transition:transform .18s,background .18s,border-color .18s;
}
#thumb-overlay:hover .play-ring{
  transform:scale(1.08);
  background:rgba(192,132,252,0.28);
  border-color:var(--accent);
}
.play-ring svg{fill:white;width:30px;height:30px;margin-left:4px;}
#thumb-overlay.gone{display:none;}

#video-player{
  width:100%;height:100%;display:block;
  object-fit:contain;background:#000;
}
#audio-player-wrap{display:none;}

/* ── Below video ── */
.below{padding:14px 16px 0;}

/* Title */
.vid-title{
  font-size:17px;font-weight:700;line-height:1.35;
  margin-bottom:10px;color:var(--text);
}

/* Meta pills row */
.meta-row{
  display:flex;align-items:center;flex-wrap:wrap;gap:6px;
  margin-bottom:14px;
}
.meta-pill{
  display:flex;align-items:center;gap:4px;
  background:var(--surface2);border:1px solid var(--border);
  border-radius:20px;padding:4px 10px;
  font-size:11.5px;color:var(--muted);
  font-family:'JetBrains Mono',monospace;
}
.meta-pill svg{fill:var(--muted);width:12px;height:12px;flex-shrink:0;}
.meta-pill b{color:var(--text);font-weight:500;}

/* divider */
.divider{height:1px;background:var(--border);margin:0 0 14px;}

/* ── Channel card ── */
.channel-card{
  display:flex;align-items:center;gap:12px;
  margin-bottom:14px;
}
.ch-avatar{
  width:42px;height:42px;border-radius:50%;flex-shrink:0;
  background:linear-gradient(135deg,var(--accent2) 0%,#7c3aed 50%,#db2777 100%);
  display:flex;align-items:center;justify-content:center;
  font-size:18px;font-weight:800;color:white;
  box-shadow:0 0 0 2px var(--accent-glow);
  overflow:hidden;
}
.ch-avatar img{width:100%;height:100%;object-fit:cover;}
.ch-info{flex:1;min-width:0;}
.ch-name{font-size:14px;font-weight:700;color:var(--text);}
.ch-sub{font-size:12px;color:var(--muted);margin-top:1px;}
.subscribe-btn{
  display:flex;align-items:center;gap:6px;
  background:var(--accent2);color:white;
  border:none;border-radius:20px;padding:7px 16px;
  font-size:13px;font-weight:700;font-family:'Outfit',sans-serif;
  cursor:pointer;text-decoration:none;
  transition:background .15s,transform .1s;
  white-space:nowrap;
}
.subscribe-btn:hover{background:var(--accent);transform:translateY(-1px);}
.subscribe-btn svg{fill:white;width:14px;height:14px;}

/* ── Action bar ── */
.action-bar{
  display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;
}
.act-btn{
  display:flex;align-items:center;gap:6px;
  background:var(--surface2);border:1px solid var(--border);
  color:var(--text);border-radius:20px;padding:8px 16px;
  font-size:13px;font-weight:600;font-family:'Outfit',sans-serif;
  cursor:pointer;text-decoration:none;
  transition:background .15s,border-color .15s;
  white-space:nowrap;
}
.act-btn:hover{background:var(--surface3);border-color:var(--accent);}
.act-btn svg{fill:var(--text);width:15px;height:15px;}
.act-btn.primary{
  background:linear-gradient(90deg,var(--accent2),#7c3aed);
  border-color:transparent;color:white;
  box-shadow:0 2px 14px rgba(168,85,247,0.3);
}
.act-btn.primary svg{fill:white;}
.act-btn.primary:hover{filter:brightness(1.1);}

/* ── Description ── */
.desc-card{
  background:var(--surface2);border:1px solid var(--border);
  border-radius:var(--radius);padding:14px;
  margin-bottom:14px;
}
.desc-label{
  font-size:10px;font-weight:700;color:var(--accent);
  letter-spacing:1.5px;text-transform:uppercase;margin-bottom:7px;
}
.desc-text{font-size:13.5px;color:var(--muted);line-height:1.7;}

/* ── Non-video card ── */
.file-card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:var(--radius);padding:32px 24px;
  text-align:center;margin:0;
  display:flex;flex-direction:column;align-items:center;gap:12px;
}
.file-icon-big{font-size:56px;line-height:1;}
.file-name-big{font-size:18px;font-weight:700;color:var(--text);}
.file-type-tag{
  background:var(--surface3);border:1px solid var(--border);
  border-radius:6px;padding:3px 10px;
  font-size:11px;color:var(--muted);
  letter-spacing:1px;text-transform:uppercase;
  font-family:'JetBrains Mono',monospace;
}

/* ── Audio player ── */
.audio-card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:0;padding:24px 20px;
  display:flex;align-items:center;gap:16px;
}
.audio-icon{font-size:44px;line-height:1;flex-shrink:0;}
.audio-card audio{flex:1;min-width:0;accent-color:var(--accent);}

/* ── Bottom nav (YT style) ── */
.bottom-nav{
  position:fixed;bottom:0;left:0;right:0;
  background:rgba(13,13,18,0.96);
  backdrop-filter:blur(12px);
  border-top:1px solid var(--border);
  display:flex;justify-content:space-around;align-items:center;
  padding:6px 0 calc(6px + env(safe-area-inset-bottom));
  z-index:100;
}
.nav-item{
  display:flex;flex-direction:column;align-items:center;gap:3px;
  color:var(--muted2);font-size:10px;font-weight:600;
  text-decoration:none;letter-spacing:.3px;
  padding:4px 12px;cursor:pointer;
  transition:color .15s;
}
.nav-item svg{fill:var(--muted2);width:20px;height:20px;transition:fill .15s;}
.nav-item.active{color:var(--accent);}
.nav-item.active svg{fill:var(--accent);}

/* ── Toasts ── */
#toast{
  position:fixed;bottom:72px;left:50%;transform:translateX(-50%) translateY(20px);
  background:var(--surface3);border:1px solid var(--border);
  color:var(--text);font-size:13px;font-weight:500;
  padding:9px 18px;border-radius:20px;
  opacity:0;transition:opacity .25s,transform .25s;
  pointer-events:none;white-space:nowrap;z-index:999;
}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* ── Hidden util ── */
.hidden{display:none!important;}

@media(min-width:600px){
  .video-wrap{border-radius:0 0 var(--radius) var(--radius);}
  .vid-title{font-size:19px;}
}
</style>
</head>

<script>
// ── Telegram Mini App init ────────────────────────────────────────────────────
const tg = window.Telegram?.WebApp;
if (tg) {
  tg.ready();
  tg.expand();
  tg.setHeaderColor('#0d0d12');
  tg.setBackgroundColor('#0d0d12');
}

// ── Params ────────────────────────────────────────────────────────────────────
const P       = new URLSearchParams(location.search);
const FILE_ID = P.get('fid')     || '';
const BOT_TK  = P.get('bot')     || '';
const TITLE   = P.get('title')   || 'Untitled';
const DATE_R  = P.get('date')    || '';
const FTYPE   = P.get('type')    || 'video';
const CAP     = P.get('caption') || '';
const THUMB   = P.get('thumb')   || '';

const $id = id => document.getElementById(id);

// ── Toast ─────────────────────────────────────────────────────────────────────
function showToast(msg, ms=2200) {
  const t = $id('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), ms);
}

// ── Error / Show ──────────────────────────────────────────────────────────────
function showError(msg) {
  $id('loading-screen').classList.add('hidden');
  $id('error-screen').classList.remove('hidden');
  $id('error-msg').textContent = msg;
}
function showPlayer() {
  $id('loading-screen').classList.add('hidden');
  $id('player-ui').classList.remove('hidden');
}

// ── Format datetime ───────────────────────────────────────────────────────────
function fmtDT(iso) {
  if (!iso) return ['—', '—'];
  try {
    const d = new Date(iso);
    return [
      d.toLocaleDateString('en-IN', {day:'2-digit',month:'short',year:'numeric'}),
      d.toLocaleTimeString('en-IN', {hour:'2-digit',minute:'2-digit',hour12:true})
    ];
  } catch { return [iso, '']; }
}

// ── Telegram getFile ──────────────────────────────────────────────────────────
async function tgFileUrl(fileId) {
  const r = await fetch(`https://api.telegram.org/bot${BOT_TK}/getFile?file_id=${encodeURIComponent(fileId)}`);
  const j = await r.json();
  if (!j.ok) throw new Error(j.description || 'getFile failed');
  return `https://api.telegram.org/file/bot${BOT_TK}/${j.result.file_path}`;
}

// ── File type icons ───────────────────────────────────────────────────────────
const ICONS = {video:'🎬',audio:'🎵',document:'📄',photo:'🖼️',voice:'🎙️',video_note:'📹',sticker:'🌀'};

// ── Main ──────────────────────────────────────────────────────────────────────
async function init() {
  if (!FILE_ID || !BOT_TK) {
    showError('Missing file info. Please open this via the ALYA bot link.');
    return;
  }

  try {
    // Resolve URLs in parallel
    const [fileUrl, thumbUrl] = await Promise.all([
      tgFileUrl(FILE_ID),
      THUMB ? tgFileUrl(THUMB).catch(() => '') : Promise.resolve('')
    ]);

    // ── Meta ──
    const decodedTitle = decodeURIComponent(TITLE);
    const [dateStr, timeStr] = fmtDT(DATE_R);
    const decodedCap = decodeURIComponent(CAP || '');

    $id('vid-title').textContent    = decodedTitle;
    $id('meta-date-val').textContent = dateStr;
    $id('meta-time-val').textContent = timeStr;
    $id('pill-type').querySelector('b').textContent =
      FTYPE.charAt(0).toUpperCase() + FTYPE.slice(1).replace('_',' ');

    // ── Download btn ──
    const dlBtn = $id('download-btn');
    dlBtn.href = fileUrl;
    dlBtn.setAttribute('download', decodedTitle);

    // ── Share ──
    $id('share-btn').addEventListener('click', () => {
      if (tg && tg.switchInlineQuery) {
        tg.switchInlineQuery(location.href);
      } else if (navigator.share) {
        navigator.share({ title: decodedTitle, url: location.href }).catch(()=>{});
      } else {
        navigator.clipboard?.writeText(location.href);
        showToast('🔗 Link copied!');
      }
    });

    // ── Copy link ──
    $id('copy-btn').addEventListener('click', () => {
      navigator.clipboard?.writeText(location.href)
        .then(() => showToast('✅ Link copied!'))
        .catch(() => showToast('Could not copy'));
    });

    // ── Caption ──
    if (decodedCap) {
      $id('desc-card').classList.remove('hidden');
      $id('desc-text').textContent = decodedCap;
    }

    // ── Render by type ──
    const isVideo = FTYPE === 'video' || FTYPE === 'video_note';
    const isAudio = FTYPE === 'audio' || FTYPE === 'voice';

    if (isVideo) {
      // Thumbnail
      if (thumbUrl) {
        $id('thumb-img').src = thumbUrl;
      } else {
        $id('thumb-img').style.display = 'none';
      }

      const vid = $id('video-player');
      vid.src = fileUrl;

      $id('play-ring').addEventListener('click', () => {
        $id('thumb-overlay').classList.add('gone');
        vid.style.display = 'block';
        vid.play();
      });
      vid.addEventListener('play', () => {
        $id('thumb-overlay').classList.add('gone');
        vid.style.display = 'block';
      });

    } else if (isAudio) {
      $id('video-wrap').classList.add('hidden');
      $id('audio-card').classList.remove('hidden');
      $id('audio-player').src = fileUrl;

    } else {
      $id('video-wrap').classList.add('hidden');
      $id('file-card').classList.remove('hidden');
      $id('file-icon-big').textContent  = ICONS[FTYPE] || '📄';
      $id('file-name-big').textContent  = decodedTitle;
      $id('file-type-tag').textContent  = FTYPE.toUpperCase().replace('_',' ');
    }

    showPlayer();

  } catch(e) {
    showError(`Failed to load: ${e.message}`);
  }
}

init();
</script>
</body>
</html>
